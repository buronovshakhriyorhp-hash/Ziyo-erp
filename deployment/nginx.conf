server {
    listen 80;
    listen [::]:80;
    server_name erp.example.com; # Replace with your actual domain

    # Redirect all HTTP requests to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name erp.example.com; # Replace with your actual domain

    # SSL Certificates (Managed by certbot typically)
    # ssl_certificate /etc/letsencrypt/live/erp.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/erp.example.com/privkey.pem;

    # GZIP Compression for ultra-fast frontend loading
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Location for static Frontend (React/Vite)
    location / {
        root /var/www/erp-frontend/dist; # Replace with the absolute path to your frontend/dist
        index index.html;
        try_files $uri $uri/ /index.html;

        # Cache control for static assets (images, css, js)
        location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public, max-age=15552000, immutable";
        }
    }

    # Reverse Proxy for Node.js Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Real IP Forwarding (Critical for rate-limiting behind Cloudflare/Nginx)
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse Proxy for Uploads (Static files served by backend)
    location /uploads/ {
        alias /var/www/erp-backend/uploads/; # Replace with the backend uploads folder path
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }
}
